<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopeList - 友人台帳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
            writing-mode: horizontal-tb;
        }

        /* ===== ログイン画面 ===== */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-box {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-box h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-box p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 0.5rem;
            background: rgba(15, 23, 42, 0.8);
            color: #e2e8f0;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .form-group select option {
            background: #1e293b;
            color: #e2e8f0;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            margin-bottom: 0.75rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }

        .btn-secondary {
            background: rgba(71, 85, 105, 0.2);
            color: #60a5fa;
            border: 1px solid #3b82f6;
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        .toggle-mode {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .toggle-mode button {
            background: none;
            border: none;
            color: #3b82f6;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        /* ===== ダッシュボード ===== */
        #dashboard {
            display: none;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 0.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info span {
            color: #cbd5e1;
            font-size: 1rem;
        }

        .user-info #username-display {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 0.375rem;
        }

        .btn-add {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
        }

        .btn-add:hover {
            transform: translateY(-2px);
        }

        .btn-config {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }

        .btn-config:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* ===== ソート・列管理 ===== */
        .sort-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .sort-bar label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .sort-bar select {
            padding: 0.5rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 0.375rem;
            color: #e2e8f0;
            cursor: pointer;
        }

        .table-action-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            margin-bottom: 1rem;
            gap: 0.5rem;
        }

        .table-action-row .btn-add {
            justify-self: center;
        }

        .table-action-row .btn-config {
            justify-self: end;
        }

        .table-action-row .btn {
            width: auto;
        }

        /* ===== テーブル ===== */
        .table-wrapper {
            overflow-x: auto;
            margin: 2rem 0;
            border-radius: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.3);
            overflow: hidden;
        }

        thead {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
            position: sticky;
            top: 0;
        }

        th {
            padding: 0.75rem 0.5rem;
            text-align: left;
            font-weight: 600;
            color: #60a5fa;
            border-right: 1px solid rgba(71, 85, 105, 0.2);
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        th:last-child {
            border-right: none;
        }

        th:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        td {
            padding: 0.75rem 0.5rem;
            border-right: 1px solid rgba(71, 85, 105, 0.2);
            border-bottom: 1px solid rgba(71, 85, 105, 0.1);
            font-size: 0.9rem;
        }

        td:last-child {
            border-right: none;
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .action-cell {
            display: flex;
            gap: 0.25rem;
            justify-content: center;
        }

        .circle-btn {
            width: 38px;
            height: 38px;
            border: 2px solid #3b82f6;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.08);
            color: #3b82f6;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.15);
        }

        .circle-btn.checked {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.35);
        }

        .circle-btn:hover {
            transform: scale(1.1);
        }

        .icon-btn {
            padding: 0.5rem 0.75rem;
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .icon-btn:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .icon-btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .icon-btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .total-row {
            background: rgba(15, 23, 42, 0.95);
            font-weight: bold;
        }

        .total-row td {
            border-bottom: none;
        }

        /* ===== モーダル ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            margin: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #e2e8f0;
        }

        .form-section {
            margin-bottom: 1.5rem;
        }

        .form-section h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            padding-bottom: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-row.triple {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-buttons button {
            flex: 1;
            padding: 0.75rem;
        }

        /* ===== レスポンシブ ===== */
        @media (max-width: 768px) {
            .container {
                padding: 0.5rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                padding: 1rem;
                margin-bottom: 1rem;
            }

            .user-info #username-display {
                font-size: 1.1rem;
            }

            .action-buttons {
                width: 100%;
                justify-content: flex-end;
            }

            .action-buttons button {
                flex: none;
                min-width: auto;
            }

            .sort-bar {
                flex-direction: column;
                align-items: stretch;
                padding: 0.75rem;
                margin-bottom: 1rem;
            }

            .sort-bar select {
                width: 100%;
            }

            .table-action-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .table-action-row .btn-add {
                justify-self: stretch;
                order: 1;
            }

            .table-action-row .btn-config {
                justify-self: stretch;
                order: 2;
            }

            table {
                font-size: 0.75rem;
                min-width: 800px;
            }

            th, td {
                padding: 0.4rem 0.2rem;
                white-space: nowrap;
            }

            .circle-btn {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }

            .icon-btn {
                padding: 0.4rem 0.6rem;
                font-size: 0.8rem;
            }

            .form-row,
            .form-row.triple {
                grid-template-columns: 1fr;
            }

            .modal-content {
                margin: 0.5rem;
                padding: 1.5rem;
                max-height: 90vh;
            }

            .modal-header h2 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- ログイン画面 -->
    <div id="login-screen">
        <div class="login-box">
            <h1>HopeList</h1>
            <p id="login-subtitle">ログイン</p>
            
            <!-- ログインフォーム -->
            <div id="login-form" style="display: block;">
                <div class="form-group">
                    <label>ユーザー名</label>
                    <input type="text" id="login-username" placeholder="ユーザー名を入力">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="login-password" placeholder="パスワードを入力">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">ログイン</button>
                <p style="color: #94a3b8; margin: 0.75rem 0 0 0; font-size: 0.85rem; text-align: center;">共通ログイン: <strong>hopeuser / hope123</strong> または <strong>admin / admin123</strong></p>
                <div class="toggle-mode">
                    アカウントがない場合は 
                    <button onclick="toggleAuthMode()">新規登録</button>
                </div>
            </div>

            <!-- 新規登録フォーム -->
            <div id="register-form" style="display: none;">
                <div class="form-group">
                    <label>ユーザー名</label>
                    <input type="text" id="register-username" placeholder="ユーザー名を入力">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="register-password" placeholder="パスワードを入力">
                </div>
                <div class="form-group">
                    <label>パスワード（確認）</label>
                    <input type="password" id="register-password-confirm" placeholder="パスワードを再度入力">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">新規登録</button>
                <div class="toggle-mode">
                    ログイン画面に戻す
                    <button onclick="toggleAuthMode()">ログイン</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ダッシュボード -->
    <div id="dashboard">
        <div class="container">
            <div class="header">
                <div class="user-info">
                    <span>👤 <span id="username-display"></span></span>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-sm btn-logout" onclick="handleLogout()">ログアウト</button>
                </div>
            </div>

            <div class="sort-bar">
                <label>ソート: 
                    <select id="sort-column" onchange="renderTable()">
                        <option value="">なし</option>
                        <option value="name">氏名</option>
                        <option value="prefecture">都道府県</option>
                        <option value="city">市町村</option>
                        <option value="ward">区</option>
                    </select>
                </label>
            </div>

            <div class="table-action-row">
                <div></div>
                <button class="btn btn-sm btn-add" onclick="openAddModal()">➕ 友人を追加</button>
                <button class="btn btn-sm btn-config" onclick="openConfigModal()">⚙️ 列設定</button>
            </div>

            <div id="table-container"></div>
        </div>
    </div>

    <!-- 友人追加/編集モーダル -->
    <div id="friend-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">友人を追加</h2>
                <button class="modal-close" onclick="closeFriendModal()">✕</button>
            </div>
            
            <div class="form-section">
                <h3>基本情報</h3>
                <div class="form-group">
                    <label>氏名 <span style="color: #ef4444;">*</span></label>
                    <input type="text" id="friend-name" placeholder="例：山田太郎">
                </div>
                <div class="form-group">
                    <label>電話番号</label>
                    <input type="tel" id="friend-phone" placeholder="例：090-1234-5678">
                </div>
            </div>

            <div class="form-section">
                <h3>住所</h3>
                <div class="form-group">
                    <label>都道府県 <span style="color: #ef4444;">*</span></label>
                    <select id="friend-prefecture">
                        <option value="">選択してください</option>
                        <option value="北海道">北海道</option>
                        <option value="青森県">青森県</option>
                        <option value="岩手県">岩手県</option>
                        <option value="宮城県">宮城県</option>
                        <option value="秋田県">秋田県</option>
                        <option value="山形県">山形県</option>
                        <option value="福島県">福島県</option>
                        <option value="茨城県">茨城県</option>
                        <option value="栃木県">栃木県</option>
                        <option value="群馬県">群馬県</option>
                        <option value="埼玉県">埼玉県</option>
                        <option value="千葉県">千葉県</option>
                        <option value="東京都">東京都</option>
                        <option value="神奈川県">神奈川県</option>
                        <option value="新潟県">新潟県</option>
                        <option value="富山県">富山県</option>
                        <option value="石川県">石川県</option>
                        <option value="福井県">福井県</option>
                        <option value="山梨県">山梨県</option>
                        <option value="長野県">長野県</option>
                        <option value="岐阜県">岐阜県</option>
                        <option value="静岡県">静岡県</option>
                        <option value="愛知県">愛知県</option>
                        <option value="三重県">三重県</option>
                        <option value="滋賀県">滋賀県</option>
                        <option value="京都府">京都府</option>
                        <option value="大阪府">大阪府</option>
                        <option value="兵庫県">兵庫県</option>
                        <option value="奈良県">奈良県</option>
                        <option value="和歌山県">和歌山県</option>
                        <option value="鳥取県">鳥取県</option>
                        <option value="島根県">島根県</option>
                        <option value="岡山県">岡山県</option>
                        <option value="広島県">広島県</option>
                        <option value="山口県">山口県</option>
                        <option value="徳島県">徳島県</option>
                        <option value="香川県">香川県</option>
                        <option value="愛媛県">愛媛県</option>
                        <option value="高知県">高知県</option>
                        <option value="福岡県">福岡県</option>
                        <option value="佐賀県">佐賀県</option>
                        <option value="長崎県">長崎県</option>
                        <option value="熊本県">熊本県</option>
                        <option value="大分県">大分県</option>
                        <option value="宮崎県">宮崎県</option>
                        <option value="鹿児島県">鹿児島県</option>
                        <option value="沖縄県">沖縄県</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>市町村</label>
                        <input type="text" id="friend-city" placeholder="例：北九州市">
                    </div>
                    <div class="form-group">
                        <label>区</label>
                        <input type="text" id="friend-ward" placeholder="例：小倉北区">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>アクション</h3>
                <p style="color: #cbd5e1; margin-bottom: 1rem; font-size: 0.9rem;">アクション１～３はチェック項目、アクション４は自由記述欄です</p>
                <div class="form-group">
                    <label id="action1-label">アクション1</label>
                    <div style="text-align: center; margin-top: 0.5rem;">
                        <input type="checkbox" id="friend-action1" style="width: 20px; height: 20px; cursor: pointer;">
                    </div>
                </div>
                <div class="form-group">
                    <label id="action2-label">アクション2</label>
                    <div style="text-align: center; margin-top: 0.5rem;">
                        <input type="checkbox" id="friend-action2" style="width: 20px; height: 20px; cursor: pointer;">
                    </div>
                </div>
                <div class="form-group">
                    <label id="action3-label">アクション3</label>
                    <div style="text-align: center; margin-top: 0.5rem;">
                        <input type="checkbox" id="friend-action3" style="width: 20px; height: 20px; cursor: pointer;">
                    </div>
                </div>
                <div class="form-group">
                    <label id="action4-label">アクション4</label>
                    <input type="text" id="friend-action4" placeholder="自由に記入してください">
                </div>
            </div>

            <div class="form-section">
                <h3>備考</h3>
                <div class="form-group full">
                    <textarea id="friend-memo" placeholder="その他の備考を入力してください" style="min-height: 100px;"></textarea>
                </div>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeFriendModal()">キャンセル</button>
                <button class="btn btn-primary" onclick="saveFriend()">保存</button>
            </div>
        </div>
    </div>

    <!-- 列設定モーダル -->
    <div id="config-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>列設定</h2>
                <button class="modal-close" onclick="closeConfigModal()">✕</button>
            </div>
            
            <p style="color: #cbd5e1; margin-bottom: 1.5rem;">各列を表示/非表示に設定し、アクション項目の名前をカスタマイズできます。</p>

            <div class="form-section">
                <h3>表示列</h3>
                <div style="display: grid; gap: 0.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-name" checked> 氏名
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-phone" checked> 電話番号
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-prefecture" checked> 都道府県
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-city" checked> 市町村
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-ward" checked> 区
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-action1" checked> アクション1
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-action2" checked> アクション2
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-action3" checked> アクション3
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-action4" checked> アクション4
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="col-memo" checked> 備考
                    </label>
                </div>
            </div>

            <div class="form-section">
                <h3>アクション項目名</h3>
                <div class="form-group">
                    <label>アクション1</label>
                    <input type="text" id="config-action1" placeholder="例：電話">
                </div>
                <div class="form-group">
                    <label>アクション2</label>
                    <input type="text" id="config-action2" placeholder="例：メール">
                </div>
                <div class="form-group">
                    <label>アクション3</label>
                    <input type="text" id="config-action3" placeholder="例：SNS">
                </div>
                <div class="form-group">
                    <label>アクション4</label>
                    <input type="text" id="config-action4" placeholder="例：備考欄">
                </div>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeConfigModal()">キャンセル</button>
                <button class="btn btn-primary" onclick="saveConfig()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ===== ユーティリティ関数 =====
        function simpleEncrypt(text) {
            try {
                return btoa(unescape(encodeURIComponent(text)));
            } catch (error) {
                console.error('Encryption error:', error);
                throw new Error('データの暗号化に失敗しました');
            }
        }

        function simpleDecrypt(text) {
            try {
                return decodeURIComponent(escape(atob(text)));
            } catch (error) {
                console.error('Decryption error:', error);
                return text;
            }
        }

        const sharedUsers = {
            'hopeuser': 'hope123',
            'admin': 'admin123'
        };

        function getStorageKey(username) {
            return `hopelist_${username}`;
        }

        function getSharedUserData(username) {
            if (!sharedUsers[username]) return null;
            return {
                password: sharedUsers[username],
                friends: [],
                config: {
                    action1: '電話',
                    action2: 'メール',
                    action3: 'SNS',
                    action4: '備考',
                    columns: {
                        name: true,
                        phone: true,
                        prefecture: true,
                        city: true,
                        ward: true,
                        action1: true,
                        action2: true,
                        action3: true,
                        action4: true,
                        memo: true
                    }
                }
            };
        }

        // ===== 認証関数 =====
        function toggleAuthMode() {
            document.getElementById('login-form').style.display = 
                document.getElementById('login-form').style.display === 'none' ? 'block' : 'none';
            document.getElementById('register-form').style.display = 
                document.getElementById('register-form').style.display === 'none' ? 'block' : 'none';
            document.getElementById('login-subtitle').textContent = 
                document.getElementById('login-form').style.display === 'none' ? '新規登録' : 'ログイン';
        }

        function handleLogin() {
            try {
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value;

                if (!username || !password) {
                    alert('ユーザー名とパスワードを入力してください。');
                    return;
                }

                let stored = localStorage.getItem(getStorageKey(username));
                let userData = null;

                if (stored) {
                    userData = JSON.parse(simpleDecrypt(stored));
                } else if (sharedUsers[username] && sharedUsers[username] === password) {
                    userData = getSharedUserData(username);
                    // クロスブラウザ環境でも同じ初期アカウントを使えるように保存しておく
                    localStorage.setItem(getStorageKey(username), simpleEncrypt(JSON.stringify(userData)));
                }

                if (!userData) {
                    alert('ユーザーが見つかりません。');
                    return;
                }

                if (userData.password === password) {
                    sessionStorage.setItem('currentUser', username);
                    loadDashboard();
                } else {
                    alert('パスワードが正しくありません。');
                }
            } catch (error) {
                alert('ログイン中にエラーが発生しました: ' + error.message);
            }
        }

        function handleRegister() {
            try {
                const username = document.getElementById('register-username').value.trim();
                const password = document.getElementById('register-password').value;
                const passwordConfirm = document.getElementById('register-password-confirm').value;

                if (!username || username.length === 0) {
                    alert('ユーザー名を入力してください。');
                    return;
                }

                if (!password || password.length === 0) {
                    alert('パスワードを入力してください。');
                    return;
                }

                if (!passwordConfirm || passwordConfirm.length === 0) {
                    alert('パスワード（確認）を入力してください。');
                    return;
                }

                if (password !== passwordConfirm) {
                    alert('パスワードが一致しません。');
                    return;
                }

                if (password.length < 3) {
                    alert('パスワードは3文字以上で設定してください。');
                    return;
                }

                if (localStorage.getItem(getStorageKey(username))) {
                    alert('このユーザー名は既に使用されています。別のユーザー名をお試しください。');
                    return;
                }

                const userData = {
                    password: password,
                    friends: [],
                    config: {
                        action1: '電話',
                        action2: 'メール',
                        action3: 'SNS',
                        action4: '備考',
                        columns: {
                            name: true,
                            phone: true,
                            prefecture: true,
                            city: true,
                            ward: true,
                            action1: true,
                            action2: true,
                            action3: true,
                            action4: true,
                            memo: true
                        }
                    }
                };

                const encrypted = simpleEncrypt(JSON.stringify(userData));
                localStorage.setItem(getStorageKey(username), encrypted);
                
                const verify = localStorage.getItem(getStorageKey(username));
                if (!verify) {
                    alert('データの保存に失敗しました。ブラウザのストレージをご確認ください。');
                    return;
                }

                alert('新規登録に成功しました。ログインしてください。');
                toggleAuthMode();
                document.getElementById('register-username').value = '';
                document.getElementById('register-password').value = '';
                document.getElementById('register-password-confirm').value = '';
                setTimeout(() => {
                    document.getElementById('login-username').focus();
                }, 100);
            } catch (error) {
                console.error('Registration error:', error);
                alert('新規登録中にエラーが発生しました: ' + error.message);
            }
        }

        function handleLogout() {
            if (confirm('ログアウトしますか？')) {
                sessionStorage.removeItem('currentUser');
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('login-username').value = '';
                document.getElementById('login-password').value = '';
            }
        }

        // ===== ダッシュボード関数 =====
        function loadDashboard() {
            const username = sessionStorage.getItem('currentUser');
            if (!username) return;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('username-display').textContent = username;

            renderTable();
            loadConfigLabels();
        }

        function getUserData() {
            const username = sessionStorage.getItem('currentUser');
            const stored = localStorage.getItem(getStorageKey(username));
            if (stored) {
                return JSON.parse(simpleDecrypt(stored));
            }
            return getSharedUserData(username) || { password: '', friends: [], config: { action1: '電話', action2: 'メール', action3: 'SNS', action4: '備考', columns: { name: true, phone: true, prefecture: true, city: true, ward: true, action1: true, action2: true, action3: true, action4: true, memo: true } } };
        }

        function saveUserData(data) {
            const username = sessionStorage.getItem('currentUser');
            localStorage.setItem(getStorageKey(username), simpleEncrypt(JSON.stringify(data)));
        }

        function loadConfigLabels() {
            const data = getUserData();
            const config = data.config;
            document.getElementById('action1-label').textContent = config.action1 || 'アクション1';
            document.getElementById('action2-label').textContent = config.action2 || 'アクション2';
            document.getElementById('action3-label').textContent = config.action3 || 'アクション3';
            document.getElementById('action4-label').textContent = config.action4 || 'アクション4';
        }

        function renderTable() {
            const data = getUserData();
            const config = data.config;
            const friends = data.friends || [];
            const cols = config.columns || {};

            // ソート処理
            const sortColumn = document.getElementById('sort-column').value;
            let sortedFriends = [...friends];
            
            if (sortColumn === 'name') {
                sortedFriends.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
            } else if (sortColumn === 'prefecture') {
                sortedFriends.sort((a, b) => a.prefecture.localeCompare(b.prefecture, 'ja'));
            } else if (sortColumn === 'city') {
                sortedFriends.sort((a, b) => (a.city || '').localeCompare(b.city || '', 'ja'));
            } else if (sortColumn === 'ward') {
                sortedFriends.sort((a, b) => (a.ward || '').localeCompare(b.ward || '', 'ja'));
            }

            let html = '<div class="table-wrapper"><table><thead><tr>';
            
            // ヘッダー行
            if (cols.name !== false) html += `<th onclick="sortColumn('name')">氏名</th>`;
            if (cols.phone !== false) html += `<th onclick="sortColumn('phone')">電話</th>`;
            if (cols.prefecture !== false) html += `<th onclick="sortColumn('prefecture')">都道府県</th>`;
            if (cols.city !== false) html += `<th onclick="sortColumn('city')">市町村</th>`;
            if (cols.ward !== false) html += `<th onclick="sortColumn('ward')">区</th>`;
            if (cols.action1 !== false) html += `<th>${config.action1}</th>`;
            if (cols.action2 !== false) html += `<th>${config.action2}</th>`;
            if (cols.action3 !== false) html += `<th>${config.action3}</th>`;
            if (cols.action4 !== false) html += `<th>${config.action4}</th>`;
            if (cols.memo !== false) html += `<th>備考</th>`;
            html += `<th></th></tr></thead><tbody>`;

            // データ行
            let totals = {
                action1: 0,
                action2: 0,
                action3: 0
            };

            if (sortedFriends.length === 0) {
                html += `<tr><td colspan="100" style="text-align: center; padding: 2rem; color: #94a3b8;">友人がまだ登録されていません。</td></tr>`;
            } else {
                sortedFriends.forEach((friend, index) => {
                    html += '<tr>';
                    if (cols.name !== false) html += `<td>${escapeHtml(friend.name)}</td>`;
                    if (cols.phone !== false) html += `<td>${escapeHtml(friend.phone || '-')}</td>`;
                    if (cols.prefecture !== false) html += `<td>${escapeHtml(friend.prefecture)}</td>`;
                    if (cols.city !== false) html += `<td>${escapeHtml(friend.city || '-')}</td>`;
                    if (cols.ward !== false) html += `<td>${escapeHtml(friend.ward || '-')}</td>`;
                    
                    if (cols.action1 !== false) {
                        html += `<td><div class="action-cell"><button class="circle-btn ${friend.action1 ? 'checked' : ''}" onclick="toggleAction(${friends.indexOf(friend)}, 'action1')">○</button></div></td>`;
                        if (friend.action1) totals.action1++;
                    }
                    if (cols.action2 !== false) {
                        html += `<td><div class="action-cell"><button class="circle-btn ${friend.action2 ? 'checked' : ''}" onclick="toggleAction(${friends.indexOf(friend)}, 'action2')">○</button></div></td>`;
                        if (friend.action2) totals.action2++;
                    }
                    if (cols.action3 !== false) {
                        html += `<td><div class="action-cell"><button class="circle-btn ${friend.action3 ? 'checked' : ''}" onclick="toggleAction(${friends.indexOf(friend)}, 'action3')">○</button></div></td>`;
                        if (friend.action3) totals.action3++;
                    }
                    if (cols.action4 !== false) html += `<td class="editable-action4" data-index="${friends.indexOf(friend)}" onclick="editAction4InlineClick(event)" style="cursor: pointer; padding: 0.5rem; user-select: none;"><span class="action4-display">${escapeHtml(friend.action4 || '-')}</span></td>`;
                    if (cols.memo !== false) html += `<td>${escapeHtml(friend.memo || '-')}</td>`;
                    html += `<td><div class="action-cell"><button class="icon-btn" onclick="editFriend(${friends.indexOf(friend)})">✎</button><button class="icon-btn icon-btn-delete" onclick="deleteFriend(${friends.indexOf(friend)})">🗑</button></div></td>`;
                    html += '</tr>';
                });
            }

            // 合計行
            html += '<tr class="total-row">';
            if (cols.name !== false) html += `<td>合計</td>`;
            if (cols.phone !== false) html += `<td></td>`;
            if (cols.prefecture !== false) html += `<td></td>`;
            if (cols.city !== false) html += `<td></td>`;
            if (cols.ward !== false) html += `<td></td>`;
            if (cols.action1 !== false) html += `<td style="text-align: center;">${totals.action1}</td>`;
            if (cols.action2 !== false) html += `<td style="text-align: center;">${totals.action2}</td>`;
            if (cols.action3 !== false) html += `<td style="text-align: center;">${totals.action3}</td>`;
            if (cols.action4 !== false) html += `<td></td>`;
            if (cols.memo !== false) html += `<td></td>`;
            html += `<td></td></tr>`;

            html += '</tbody></table></div>';
            document.getElementById('table-container').innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sortColumn(col) {
            const sortSelect = document.getElementById('sort-column');
            if (col === 'name') sortSelect.value = 'name';
            else if (col === 'prefecture') sortSelect.value = 'prefecture';
            renderTable();
        }

        function toggleAction(index, action) {
            const data = getUserData();
            data.friends[index][action] = !data.friends[index][action];
            saveUserData(data);
            renderTable();
        }

        function editAction4InlineClick(event) {
            const cell = event.currentTarget;
            const index = parseInt(cell.getAttribute('data-index'));
            const data = getUserData();
            const currentValue = data.friends[index].action4 || '';

            // セルの内容を入力フィールドに置き換える
            cell.innerHTML = `<input type="text" class="action4-inline-edit" value="${escapeHtml(currentValue)}" style="width: 100%; padding: 0.25rem; border: 1px solid #3b82f6; background: rgba(15, 23, 42, 0.8); color: #e2e8f0; border-radius: 0.25rem;">`;
            
            const input = cell.querySelector('.action4-inline-edit');
            input.focus();
            input.select();

            function saveAction4(value) {
                data.friends[index].action4 = value.trim();
                saveUserData(data);
                renderTable();
            }

            function cancelEdit() {
                renderTable();
            }

            input.addEventListener('blur', (e) => {
                saveAction4(input.value);
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    saveAction4(input.value);
                } else if (e.key === 'Escape') {
                    cancelEdit();
                }
            });

            // クリックがセルから出ないようにする
            cell.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        }

        // ===== Friend Modal =====
        function openAddModal() {
            document.getElementById('modal-title').textContent = '友人を追加';
            clearFriendForm();
            document.getElementById('friend-modal').classList.add('active');
            window.editingIndex = null;
        }

        function closeFriendModal() {
            document.getElementById('friend-modal').classList.remove('active');
        }

        function clearFriendForm() {
            document.getElementById('friend-name').value = '';
            document.getElementById('friend-phone').value = '';
            document.getElementById('friend-prefecture').value = '';
            document.getElementById('friend-city').value = '';
            document.getElementById('friend-ward').value = '';
            document.getElementById('friend-action1').checked = false;
            document.getElementById('friend-action2').checked = false;
            document.getElementById('friend-action3').checked = false;
            document.getElementById('friend-action4').value = '';
            document.getElementById('friend-memo').value = '';
        }

        function editFriend(index) {
            const data = getUserData();
            const friend = data.friends[index];

            document.getElementById('modal-title').textContent = '友人を編集';
            document.getElementById('friend-name').value = friend.name;
            document.getElementById('friend-phone').value = friend.phone || '';
            document.getElementById('friend-prefecture').value = friend.prefecture;
            document.getElementById('friend-city').value = friend.city || '';
            document.getElementById('friend-ward').value = friend.ward || '';
            document.getElementById('friend-action1').checked = friend.action1 || false;
            document.getElementById('friend-action2').checked = friend.action2 || false;
            document.getElementById('friend-action3').checked = friend.action3 || false;
            document.getElementById('friend-action4').value = friend.action4 || '';
            document.getElementById('friend-memo').value = friend.memo || '';

            window.editingIndex = index;
            document.getElementById('friend-modal').classList.add('active');
        }

        function saveFriend() {
            const name = document.getElementById('friend-name').value.trim();
            const prefecture = document.getElementById('friend-prefecture').value.trim();

            if (!name || !prefecture) {
                alert('氏名と都道府県は必須です。');
                return;
            }

            const data = getUserData();
            const friend = {
                name: name,
                phone: document.getElementById('friend-phone').value.trim(),
                prefecture: prefecture,
                city: document.getElementById('friend-city').value.trim(),
                ward: document.getElementById('friend-ward').value.trim(),
                action1: document.getElementById('friend-action1').checked,
                action2: document.getElementById('friend-action2').checked,
                action3: document.getElementById('friend-action3').checked,
                action4: document.getElementById('friend-action4').value.trim(),
                memo: document.getElementById('friend-memo').value.trim()
            };

            if (window.editingIndex !== null) {
                data.friends[window.editingIndex] = friend;
            } else {
                data.friends.push(friend);
            }

            saveUserData(data);
            closeFriendModal();
            renderTable();
        }

        function deleteFriend(index) {
            if (confirm('この友人を削除しますか？')) {
                const data = getUserData();
                data.friends.splice(index, 1);
                saveUserData(data);
                renderTable();
            }
        }

        // ===== Config Modal =====
        function openConfigModal() {
            const data = getUserData();
            const config = data.config;
            const cols = config.columns || {};

            document.getElementById('config-action1').value = config.action1 || '電話';
            document.getElementById('config-action2').value = config.action2 || 'メール';
            document.getElementById('config-action3').value = config.action3 || 'SNS';
            document.getElementById('config-action4').value = config.action4 || '備考';

            document.getElementById('col-name').checked = cols.name !== false;
            document.getElementById('col-phone').checked = cols.phone !== false;
            document.getElementById('col-prefecture').checked = cols.prefecture !== false;
            document.getElementById('col-city').checked = cols.city !== false;
            document.getElementById('col-ward').checked = cols.ward !== false;
            document.getElementById('col-action1').checked = cols.action1 !== false;
            document.getElementById('col-action2').checked = cols.action2 !== false;
            document.getElementById('col-action3').checked = cols.action3 !== false;
            document.getElementById('col-action4').checked = cols.action4 !== false;
            document.getElementById('col-memo').checked = cols.memo !== false;

            document.getElementById('config-modal').classList.add('active');
        }

        function closeConfigModal() {
            document.getElementById('config-modal').classList.remove('active');
        }

        function saveConfig() {
            const data = getUserData();
            data.config.action1 = document.getElementById('config-action1').value.trim() || 'アクション1';
            data.config.action2 = document.getElementById('config-action2').value.trim() || 'アクション2';
            data.config.action3 = document.getElementById('config-action3').value.trim() || 'アクション3';
            data.config.action4 = document.getElementById('config-action4').value.trim() || 'アクション4';
            
            data.config.columns = {
                name: document.getElementById('col-name').checked,
                phone: document.getElementById('col-phone').checked,
                prefecture: document.getElementById('col-prefecture').checked,
                city: document.getElementById('col-city').checked,
                ward: document.getElementById('col-ward').checked,
                action1: document.getElementById('col-action1').checked,
                action2: document.getElementById('col-action2').checked,
                action3: document.getElementById('col-action3').checked,
                action4: document.getElementById('col-action4').checked,
                memo: document.getElementById('col-memo').checked
            };

            saveUserData(data);
            closeConfigModal();
            loadConfigLabels();
            renderTable();
        }

        // ===== 初期化 =====
        window.addEventListener('load', function() {
            const currentUser = sessionStorage.getItem('currentUser');
            if (currentUser) {
                loadDashboard();
            }
        });
    </script>
</body>
</html>
