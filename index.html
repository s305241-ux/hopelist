<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopeList - 友人台帳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* ===== ログイン画面 ===== */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-box {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-box h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-box p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 0.5rem;
            background: rgba(15, 23, 42, 0.8);
            color: #e2e8f0;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            margin-bottom: 0.75rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }

        .btn-secondary {
            background: rgba(71, 85, 105, 0.2);
            color: #60a5fa;
            border: 1px solid #3b82f6;
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        .toggle-mode {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .toggle-mode button {
            background: none;
            border: none;
            color: #3b82f6;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        /* ===== ダッシュボード ===== */
        #dashboard {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 0.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info span {
            color: #cbd5e1;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 0.375rem;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-config {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }

        .btn-config:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .btn-add {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
        }

        .btn-add:hover {
            transform: translateY(-2px);
        }

        /* ===== テーブル ===== */
        .table-wrapper {
            overflow-x: auto;
            margin: 2rem 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        thead {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: #60a5fa;
            border-right: 1px solid rgba(71, 85, 105, 0.2);
        }

        th:last-child {
            border-right: none;
        }

        td {
            padding: 1rem;
            border-right: 1px solid rgba(71, 85, 105, 0.2);
            border-bottom: 1px solid rgba(71, 85, 105, 0.1);
        }

        td:last-child {
            border-right: none;
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .action-cell {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: none;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .icon-btn:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .icon-btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .icon-btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        .empty-state p {
            margin-bottom: 1rem;
        }

        /* ===== モーダル ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #e2e8f0;
        }

        .form-section {
            margin-bottom: 1.5rem;
        }

        .form-section h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            padding-bottom: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-buttons button {
            flex: 1;
            padding: 0.75rem;
        }

        /* ===== レスポンシブ ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .user-info {
                width: 100%;
            }

            .action-buttons {
                width: 100%;
            }

            .action-buttons button {
                flex: 1;
            }

            table {
                font-size: 0.9rem;
            }

            th, td {
                padding: 0.75rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .action-cell {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- ログイン画面 -->
    <div id="login-screen">
        <div class="login-box">
            <h1>HopeList</h1>
            <p id="login-subtitle">ログイン</p>
            
            <!-- ログインフォーム -->
            <div id="login-form" style="display: block;">
                <div class="form-group">
                    <label>ユーザー名</label>
                    <input type="text" id="login-username" placeholder="ユーザー名を入力">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="login-password" placeholder="パスワードを入力">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">ログイン</button>
                <div class="toggle-mode">
                    アカウントがない場合は 
                    <button onclick="toggleAuthMode()">新規登録</button>
                </div>
            </div>

            <!-- 新規登録フォーム -->
            <div id="register-form" style="display: none;">
                <div class="form-group">
                    <label>ユーザー名</label>
                    <input type="text" id="register-username" placeholder="ユーザー名を入力">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="register-password" placeholder="パスワードを入力">
                </div>
                <div class="form-group">
                    <label>パスワード（確認）</label>
                    <input type="password" id="register-password-confirm" placeholder="パスワードを再度入力">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">新規登録</button>
                <div class="toggle-mode">
                    ログイン画面に戻す
                    <button onclick="toggleAuthMode()">ログイン</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ダッシュボード -->
    <div id="dashboard">
        <div class="container">
            <div class="header">
                <div class="user-info">
                    <span>👤 <span id="username-display"></span></span>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-sm btn-add" onclick="openAddModal()">➕ 友人を追加</button>
                    <button class="btn btn-sm btn-config" onclick="openConfigModal()">⚙️ アクション設定</button>
                    <button class="btn btn-sm btn-logout" onclick="handleLogout()">ログアウト</button>
                </div>
            </div>

            <div id="table-container"></div>
        </div>
    </div>

    <!-- 友人追加/編集モーダル -->
    <div id="friend-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">友人を追加</h2>
                <button class="modal-close" onclick="closeFriendModal()">✕</button>
            </div>
            
            <div class="form-section">
                <h3>基本情報</h3>
                <div class="form-group">
                    <label>氏名 <span style="color: #ef4444;">*</span></label>
                    <input type="text" id="friend-name" placeholder="例：山田太郎">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>住所（都道府県） <span style="color: #ef4444;">*</span></label>
                        <input type="text" id="friend-prefecture" placeholder="例：東京都">
                    </div>
                    <div class="form-group">
                        <label>住所（市区町村）</label>
                        <input type="text" id="friend-city" placeholder="例：渋谷区">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>アクション</h3>
                <div class="form-group">
                    <label id="action1-label">電話</label>
                    <input type="text" id="friend-action1" placeholder="">
                </div>
                <div class="form-group">
                    <label id="action2-label">メール</label>
                    <input type="text" id="friend-action2" placeholder="">
                </div>
                <div class="form-group">
                    <label id="action3-label">備考</label>
                    <input type="text" id="friend-action3" placeholder="">
                </div>
            </div>

            <div class="form-section">
                <h3>備考</h3>
                <div class="form-group full">
                    <textarea id="friend-memo" placeholder="その他の備考を入力してください" style="width: 100%; padding: 0.75rem; border: 1px solid rgba(71, 85, 105, 0.3); border-radius: 0.5rem; background: rgba(15, 23, 42, 0.8); color: #e2e8f0; font-family: inherit; resize: vertical; min-height: 100px;"></textarea>
                </div>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeFriendModal()">キャンセル</button>
                <button class="btn btn-primary" onclick="saveFriend()">保存</button>
            </div>
        </div>
    </div>

    <!-- アクション設定モーダル -->
    <div id="config-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>アクション設定</h2>
                <button class="modal-close" onclick="closeConfigModal()">✕</button>
            </div>
            
            <p style="color: #cbd5e1; margin-bottom: 1.5rem;">各アクション項目の名前をカスタマイズできます。</p>

            <div class="form-group">
                <label>アクション1</label>
                <input type="text" id="config-action1" placeholder="例：電話">
            </div>
            <div class="form-group">
                <label>アクション2</label>
                <input type="text" id="config-action2" placeholder="例：メール">
            </div>
            <div class="form-group">
                <label>アクション3</label>
                <input type="text" id="config-action3" placeholder="例：SNS">
            </div>

            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeConfigModal()">キャンセル</button>
                <button class="btn btn-primary" onclick="saveConfig()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ===== ユーティリティ関数 =====
        const crypto_key = 'hopelist_secret_key_2026';

        function simpleEncrypt(text) {
            return btoa(text);
        }

        function simpleDecrypt(text) {
            try {
                return atob(text);
            } catch {
                return text;
            }
        }

        function getStorageKey(username) {
            return `hopelist_${username}`;
        }

        // ===== 認証関数 =====
        function toggleAuthMode() {
            document.getElementById('login-form').style.display = 
                document.getElementById('login-form').style.display === 'none' ? 'block' : 'none';
            document.getElementById('register-form').style.display = 
                document.getElementById('register-form').style.display === 'none' ? 'block' : 'none';
            document.getElementById('login-subtitle').textContent = 
                document.getElementById('login-form').style.display === 'none' ? '新規登録' : 'ログイン';
        }

        function handleLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                alert('ユーザー名とパスワードを入力してください。');
                return;
            }

            const stored = localStorage.getItem(getStorageKey(username));
            if (!stored) {
                alert('ユーザーが見つかりません。');
                return;
            }

            try {
                const userData = JSON.parse(simpleDecrypt(stored));
                if (userData.password === password) {
                    sessionStorage.setItem('currentUser', username);
                    loadDashboard();
                } else {
                    alert('パスワードが正しくありません。');
                }
            } catch {
                alert('ユーザー情報の読み込みに失敗しました。');
            }
        }

        function handleRegister() {
            try {
                const username = document.getElementById('register-username').value.trim();
                const password = document.getElementById('register-password').value;
                const passwordConfirm = document.getElementById('register-password-confirm').value;

                if (!username || username.length === 0) {
                    alert('ユーザー名を入力してください。');
                    return;
                }

                if (!password || password.length === 0) {
                    alert('パスワードを入力してください。');
                    return;
                }

                if (!passwordConfirm || passwordConfirm.length === 0) {
                    alert('パスワード（確認）を入力してください。');
                    return;
                }

                if (password !== passwordConfirm) {
                    alert('パスワードが一致しません。');
                    return;
                }

                if (password.length < 3) {
                    alert('パスワードは3文字以上で設定してください。');
                    return;
                }

                if (localStorage.getItem(getStorageKey(username))) {
                    alert('このユーザー名は既に使用されています。別のユーザー名をお試しください。');
                    return;
                }

                const userData = {
                    password: password,
                    friends: [],
                    config: {
                        action1: '電話',
                        action2: 'メール',
                        action3: 'SNS'
                    }
                };

                const encrypted = simpleEncrypt(JSON.stringify(userData));
                localStorage.setItem(getStorageKey(username), encrypted);
                
                // 保存確認
                const verify = localStorage.getItem(getStorageKey(username));
                if (!verify) {
                    alert('データの保存に失敗しました。ブラウザのストレージをご確認ください。');
                    return;
                }

                alert('新規登録に成功しました。ログインしてください。');
                toggleAuthMode();
                document.getElementById('register-username').value = '';
                document.getElementById('register-password').value = '';
                document.getElementById('register-password-confirm').value = '';
                // ログインフォームをフォーカス
                setTimeout(() => {
                    document.getElementById('login-username').focus();
                }, 100);
            } catch (error) {
                console.error('Registration error:', error);
                alert('新規登録中にエラーが発生しました: ' + error.message);
            }
        }

        function handleLogout() {
            if (confirm('ログアウトしますか？')) {
                sessionStorage.removeItem('currentUser');
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('login-username').value = '';
                document.getElementById('login-password').value = '';
            }
        }

        // ===== ダッシュボード関数 =====
        function loadDashboard() {
            const username = sessionStorage.getItem('currentUser');
            if (!username) return;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('username-display').textContent = username;

            renderTable();
            loadConfigLabels();
        }

        function getUserData() {
            const username = sessionStorage.getItem('currentUser');
            const stored = localStorage.getItem(getStorageKey(username));
            return JSON.parse(simpleDecrypt(stored));
        }

        function saveUserData(data) {
            const username = sessionStorage.getItem('currentUser');
            localStorage.setItem(getStorageKey(username), simpleEncrypt(JSON.stringify(data)));
        }

        function renderTable() {
            const data = getUserData();
            const config = data.config;
            const friends = data.friends || [];

            let html = '<div class="table-wrapper"><table><thead><tr>';
            html += '<th>氏名</th>';
            html += '<th>住所（都道府県）</th>';
            html += '<th>住所（市区町村）</th>';
            html += `<th>${config.action1 || 'アクション1'}</th>`;
            html += `<th>${config.action2 || 'アクション2'}</th>`;
            html += `<th>${config.action3 || 'アクション3'}</th>`;
            html += '<th>備考</th>';
            html += '<th>操作</th></tr></thead><tbody>';

            if (friends.length === 0) {
                html += '<tr><td colspan="8" style="text-align: center; padding: 2rem; color: #94a3b8;">友人がまだ登録されていません。「友人を追加」ボタンから初めての友人を追加してください。</td></tr>';
            } else {
                friends.forEach((friend, index) => {
                    html += '<tr>';
                    html += `<td>${escapeHtml(friend.name)}</td>`;
                    html += `<td>${escapeHtml(friend.prefecture)}</td>`;
                    html += `<td>${escapeHtml(friend.city || '-')}</td>`;
                    html += `<td>${escapeHtml(friend.action1 || '-')}</td>`;
                    html += `<td>${escapeHtml(friend.action2 || '-')}</td>`;
                    html += `<td>${escapeHtml(friend.action3 || '-')}</td>`;
                    html += `<td>${escapeHtml(friend.memo || '-')}</td>`;
                    html += '<td><div class="action-cell">';
                    html += `<button class="icon-btn" onclick="editFriend(${index})">✎ 編集</button>`;
                    html += `<button class="icon-btn icon-btn-delete" onclick="deleteFriend(${index})">🗑 削除</button>`;
                    html += '</div></td>';
                    html += '</tr>';
                });
            }

            html += '</tbody></table></div>';
            document.getElementById('table-container').innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== friend modal =====
        function openAddModal() {
            document.getElementById('modal-title').textContent = '友人を追加';
            clearFriendForm();
            document.getElementById('friend-modal').classList.add('active');
            window.editingIndex = null;
        }

        function closeFriendModal() {
            document.getElementById('friend-modal').classList.remove('active');
        }

        function clearFriendForm() {
            document.getElementById('friend-name').value = '';
            document.getElementById('friend-prefecture').value = '';
            document.getElementById('friend-city').value = '';
            document.getElementById('friend-action1').value = '';
            document.getElementById('friend-action2').value = '';
            document.getElementById('friend-action3').value = '';
            document.getElementById('friend-memo').value = '';
        }

        function editFriend(index) {
            const data = getUserData();
            const friend = data.friends[index];

            document.getElementById('modal-title').textContent = '友人を編集';
            document.getElementById('friend-name').value = friend.name;
            document.getElementById('friend-prefecture').value = friend.prefecture;
            document.getElementById('friend-city').value = friend.city || '';
            document.getElementById('friend-action1').value = friend.action1 || '';
            document.getElementById('friend-action2').value = friend.action2 || '';
            document.getElementById('friend-action3').value = friend.action3 || '';
            document.getElementById('friend-memo').value = friend.memo || '';

            window.editingIndex = index;
            document.getElementById('friend-modal').classList.add('active');
        }

        function saveFriend() {
            const name = document.getElementById('friend-name').value.trim();
            const prefecture = document.getElementById('friend-prefecture').value.trim();

            if (!name || !prefecture) {
                alert('氏名と住所（都道府県）は必須です。');
                return;
            }

            const data = getUserData();
            const friend = {
                name: name,
                prefecture: prefecture,
                city: document.getElementById('friend-city').value.trim(),
                action1: document.getElementById('friend-action1').value.trim(),
                action2: document.getElementById('friend-action2').value.trim(),
                action3: document.getElementById('friend-action3').value.trim(),
                memo: document.getElementById('friend-memo').value.trim()
            };

            if (window.editingIndex !== null) {
                data.friends[window.editingIndex] = friend;
            } else {
                data.friends.push(friend);
            }

            saveUserData(data);
            closeFriendModal();
            renderTable();
        }

        function deleteFriend(index) {
            if (confirm('この友人を削除しますか？')) {
                const data = getUserData();
                data.friends.splice(index, 1);
                saveUserData(data);
                renderTable();
            }
        }

        // ===== config modal =====
        function loadConfigLabels() {
            const data = getUserData();
            const config = data.config;
            document.getElementById('action1-label').textContent = config.action1 || 'アクション1';
            document.getElementById('action2-label').textContent = config.action2 || 'アクション2';
            document.getElementById('action3-label').textContent = config.action3 || 'アクション3';
        }

        function openConfigModal() {
            const data = getUserData();
            const config = data.config;
            document.getElementById('config-action1').value = config.action1 || '電話';
            document.getElementById('config-action2').value = config.action2 || 'メール';
            document.getElementById('config-action3').value = config.action3 || 'SNS';
            document.getElementById('config-modal').classList.add('active');
        }

        function closeConfigModal() {
            document.getElementById('config-modal').classList.remove('active');
        }

        function saveConfig() {
            const data = getUserData();
            data.config = {
                action1: document.getElementById('config-action1').value.trim() || 'アクション1',
                action2: document.getElementById('config-action2').value.trim() || 'アクション2',
                action3: document.getElementById('config-action3').value.trim() || 'アクション3'
            };
            saveUserData(data);
            closeConfigModal();
            loadConfigLabels();
            renderTable();
        }

        // ===== 初期化 =====
        window.addEventListener('load', function() {
            const currentUser = sessionStorage.getItem('currentUser');
            if (currentUser) {
                loadDashboard();
            }
        });
    </script>
</body>
</html>
